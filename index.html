<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Landing Page Opening</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="landing">
    <img id="envolope" src="images/envolopebase.png" alt="Envelope Base" />
    <img id="cartoon1" class="cartoon-frame active" src="images/cartoon1.png" alt="Cartoon Frame 1" />
    <img id="cartoon2" class="cartoon-frame" src="images/cartoon2.png" alt="Cartoon Frame 2" />
    <img id="flap" src="images/flap.png" alt="Envelope Flap" />
    <button id="sealButton" aria-label="Open Seal">
      <img id="seal" src="images/seal.png" alt="Seal" />
    </button>
    <div id="fireworks" aria-hidden="true"></div>
  </div>

  <div id="mainView">
    <div id="countdown" aria-label="Countdown">
      <span id="countdown-label">Countdown</span>
      <div id="countdown-values">
        <span class="countdown-item"><span class="countdown-number" id="days">00</span><span class="countdown-unit">days</span></span>
        <span class="countdown-item"><span class="countdown-number" id="hours">00</span><span class="countdown-unit">hours</span></span>
        <span class="countdown-item"><span class="countdown-number" id="minutes">00</span><span class="countdown-unit">minutes</span></span>
        <span class="countdown-item"><span class="countdown-number" id="seconds">00</span><span class="countdown-unit">seconds</span></span>
      </div>
    </div>
    <img src="images/main.png" alt="Main Page" />
    <a class="btn-contact-test" href="javascript:void(0)" aria-label="Contact Button Left">
      <img src="images/contactbt.png" alt="Contact" />
    </a>
    <a class="btn-contact-test-right" href="javascript:void(0)" aria-label="Contact Button Right">
      <img src="images/contactbt.png" alt="Contact" />
    </a>
    <a class="btn-location" href="javascript:void(0)" aria-label="Location Button">
      <img src="images/locationbt.png" alt="Location" />
    </a>
    <a class="btn-photo" href="javascript:void(0)" aria-label="Photo Button">
      <img src="images/photobt.png" alt="Photo" />
    </a>
    <div id="rsvpPanel">
      <div class="rsvp-title">RSVP</div>
      <label class="rsvp-field">
        <span>Name
        </span>
        <input id="rsvp-name" type="text" placeholder="Name" />
      </label>
      <label class="rsvp-field">
        <span>Number of Guests</span>
        <input id="rsvp-guest" type="number" min="1" placeholder="1" />
      </label>
      <label class="rsvp-field">
        <span>Send Your Wishes</span>
        <textarea id="rsvp-message" rows="3" placeholder="Send Your Wishes"></textarea>
      </label>
      <div class="rsvp-actions">
        <button id="rsvpSubmit" type="button">Send</button>
        <button id="viewBlessings" type="button">Guest Wishes</button>
      </div>
      <div id="blessingsPanel" class="blessings-panel" hidden>
        <div class="blessings-header">Guest Wishes</div>
        <div id="blessingsList" class="blessings-list"></div>
      </div>
    </div>
  </div>

  <button id="bgmToggle" type="button" aria-label="Toggle Music">
    <img src="images/bgmbt.png" alt="Music" />
  </button>

  <script src="script.js"></script>
</body>
</html>
